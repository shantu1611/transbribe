<form method="get">
  <input type="text" name="path" value="{{ folder_path }}"
         placeholder="/home/you/documents" style="width:400px">
  <button type="submit">List Files</button>
</form>

{% if error %}
  <p style="color:red">{{ error }}</p>
{% endif %}

{% if files %}
  <ul>
    {% for file in files %}
      <li>{{ file }}</li>
    {% endfor %}
  </ul>
{% endif %}
